name: Build ME_OpenDRT Linux (single x86_64 CUDA build with OpenCL/CPU fallback)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash
        working-directory: ME_OpenDRT/source

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve package version
        id: version
        run: |
          version="$(grep -Eo 'set\(OPENDRT_DISPLAY_VERSION "[^"]+"\)' CMakeLists.txt | sed -E 's/.*"([^"]+)".*/\1/' | head -n1)"
          if [ -z "${version}" ]; then
            version="$(grep -Eo 'project\(ME_OpenDRT VERSION [0-9A-Za-z.\-]+' CMakeLists.txt | sed -E 's/.*VERSION ([0-9A-Za-z.\-]+)/\1/' | head -n1)"
          fi
          if [ -z "${version}" ]; then
            echo "Could not determine ME_OpenDRT version from ME_OpenDRT/source/CMakeLists.txt"
            exit 1
          fi
          echo "package_version=${version}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=ME_OpenDRT-v${version}-linux-x86_64-cuda-opencl-cpu" >> "$GITHUB_OUTPUT"
          echo "archive_name=ME_OpenDRT_v${version}_linux_x86_64_cuda_opencl_cpu_portable.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ ocl-icd-opencl-dev libglfw3-dev libgl1-mesa-dev xvfb
          sudo apt-get install -y nvidia-cuda-toolkit

      - name: Configure
        run: |
          cmake -S . -B build-linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DME_OPENDRT_LINUX_CUDA=ON \
            -DME_OPENDRT_LINUX_VIEWER_CUDA=OFF \
            -DME_OPENDRT_BUILD_CUBE_VIEWER_STUB=ON

      - name: Build
        run: cmake --build build-linux --config Release -j

      - name: Verify bundle outputs
        run: |
          test -f bundle/ME_OpenDRT.ofx.bundle/Contents/Linux-x86-64/ME_OpenDRT.ofx
          test -f bundle/ME_OpenDRT.ofx.bundle/Contents/Linux-x86-64/ME_OpenDRT_CubeViewer
          chmod +x bundle/ME_OpenDRT.ofx.bundle/Contents/Linux-x86-64/ME_OpenDRT_CubeViewer

      - name: Verify Linux viewer runtime deps and launch
        run: |
          viewer="bundle/ME_OpenDRT.ofx.bundle/Contents/Linux-x86-64/ME_OpenDRT_CubeViewer"
          ldd "$viewer" | tee /tmp/me_opendrt_viewer_ldd.txt
          if grep -q "not found" /tmp/me_opendrt_viewer_ldd.txt; then
            echo "Unresolved shared libraries in Cube Viewer"
            exit 1
          fi
          set +e
          timeout 5s xvfb-run -a "$viewer" >/tmp/me_opendrt_viewer_run.log 2>&1
          rc=$?
          set -e
          if [ "$rc" -ne 124 ]; then
            echo "Cube Viewer exited early (rc=$rc); expected timeout(124) if launch is healthy."
            cat /tmp/me_opendrt_viewer_run.log
            exit 1
          fi

      - name: Package Linux portable bundle
        run: |
          tar -czf ../../${{ steps.version.outputs.archive_name }} \
            -C bundle ME_OpenDRT.ofx.bundle

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: ${{ steps.version.outputs.archive_name }}





