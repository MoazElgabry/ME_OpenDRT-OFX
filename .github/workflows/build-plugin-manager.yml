name: Build Moaz Elgabry Plugins

on:
  workflow_dispatch:
  push:
    paths:
      - "Moaz Elgabry Plugins/**"
      - ".github/workflows/build-plugin-manager.yml"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: "Moaz Elgabry Plugins/package.json"

      - name: Install frontend dependencies
        working-directory: "Moaz Elgabry Plugins"
        run: npm install

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "Moaz Elgabry Plugins/src-tauri -> target"

      - name: Build and draft release
        uses: tauri-apps/tauri-action@action-v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: "Moaz Elgabry Plugins"
          tagName: plugin-manager-v__VERSION__
          releaseName: Moaz Elgabry Plugins v__VERSION__
          releaseBody: See the release assets for installer and updater artifacts.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
