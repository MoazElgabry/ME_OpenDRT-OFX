name: Build MoazElgabry Plugin Manager

on:
  workflow_dispatch:
  push:
    paths:
      - "MoazElgabryPluginManager/**"
      - ".github/workflows/build-plugin-manager.yml"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: MoazElgabryPluginManager/package.json

      - name: Install frontend dependencies
        working-directory: MoazElgabryPluginManager
        run: npm install

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: MoazElgabryPluginManager/src-tauri -> target

      - name: Build and draft release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          MEPM_UPDATER_PUBKEY: ${{ secrets.MEPM_UPDATER_PUBKEY }}
          MEPM_UPDATER_ENDPOINT: https://moazelgabry.github.io/MoazElgabryPluginManager/updates/latest.json
        with:
          projectPath: MoazElgabryPluginManager
          tagName: plugin-manager-v__VERSION__
          releaseName: MoazElgabry Plugin Manager v__VERSION__
          releaseBody: See the release assets for installer and updater artifacts.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
