name: Build ME_OpenDRT All Platforms

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  detect-changes:
    name: Detect build-relevant changes
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.changes.outputs.should_build }}
      changed_files: ${{ steps.changes.outputs.changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Decide whether ME_OpenDRT should build
        id: changes
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -z "${BEFORE}" ] || [ "${BEFORE}" = "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git ls-files)"
          else
            changed_files="$(git diff --name-only "${BEFORE}" "${AFTER}")"
          fi

          printf '%s\n' "${changed_files}" > changed_files.txt

          if grep -Eq '^(ME_OpenDRT/source/CMakeLists\.txt|ME_OpenDRT/source/cmake/|ME_OpenDRT/source/src/|ME_OpenDRT/source/tools/|ME_OpenDRT/OFX-Workshop/|\.github/workflows/build-me_opendrt-(all-platforms|linux|macos|macos-arm64-safe|windows)\.yml)' changed_files.txt; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "changed_files<<EOF"
            cat changed_files.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize decision
        run: |
          if [ "${{ steps.changes.outputs.should_build }}" = "true" ]; then
            {
              echo "ME_OpenDRT build will run."
              echo
              echo "Relevant changes were detected in:"
              printf '%s\n' "${{ steps.changes.outputs.changed_files }}"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "ME_OpenDRT build skipped cleanly."
              echo
              echo "No build-relevant changes were detected."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  windows:
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.should_build == 'true'
    uses: ./.github/workflows/build-me_opendrt-windows.yml
    secrets: inherit

  macos:
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.should_build == 'true'
    uses: ./.github/workflows/build-me_opendrt-macos.yml
    secrets: inherit

  linux:
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.should_build == 'true'
    uses: ./.github/workflows/build-me_opendrt-linux.yml
    secrets: inherit

  draft-release:
    name: Create ME_OpenDRT Draft Release
    needs:
      - detect-changes
      - windows
      - macos
      - linux
    if: github.event_name == 'push' && needs.detect-changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download platform artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Resolve package version
        id: version
        working-directory: ME_OpenDRT/source
        run: |
          set -euo pipefail

          version="$(grep -Eo 'set\(OPENDRT_DISPLAY_VERSION "[^"]+"\)' CMakeLists.txt | sed -E 's/.*"([^"]+)".*/\1/' | head -n1)"
          if [ -z "${version}" ]; then
            version="$(grep -Eo 'project\(ME_OpenDRT VERSION [0-9A-Za-z.\-]+' CMakeLists.txt | sed -E 's/.*VERSION ([0-9A-Za-z.\-]+)/\1/' | head -n1)"
          fi
          if [ -z "${version}" ]; then
            echo "Could not determine ME_OpenDRT version from ME_OpenDRT/source/CMakeLists.txt"
            exit 1
          fi
          echo "package_version=${version}" >> "$GITHUB_OUTPUT"

      - name: Prepare draft release metadata
        id: draft_meta
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: |
          set -euo pipefail

          latest_json="$(gh api "repos/${REPO}/releases/latest" 2>/dev/null || true)"
          if [ -n "${latest_json}" ]; then
            latest_tag="$(printf '%s' "${latest_json}" | python3 -c "import json,sys; print(json.load(sys.stdin).get('tag_name',''))")"
            latest_name="$(printf '%s' "${latest_json}" | python3 -c "import json,sys; print(json.load(sys.stdin).get('name',''))")"
            printf '%s' "${latest_json}" | python3 -c "import json,sys; print(json.load(sys.stdin).get('body',''))" > latest_release_body.txt
          else
            latest_tag="unreleased"
            latest_name="ME_OpenDRT"
            : > latest_release_body.txt
          fi

          short_sha="${SHA::7}"
          draft_tag="me-opendrt-draft-v${PACKAGE_VERSION}"
          draft_title="${latest_name} draft (${REF_NAME} ${short_sha})"
          final_tag="v${PACKAGE_VERSION}"

          existing_draft_json="$(gh api "repos/${REPO}/releases/tags/${draft_tag}" 2>/dev/null || true)"
          final_release_json="$(gh api "repos/${REPO}/releases/tags/${final_tag}" 2>/dev/null || true)"

          draft_exists="false"
          skip_release="false"

          if [ -n "${existing_draft_json}" ]; then
            is_draft="$(printf '%s' "${existing_draft_json}" | python3 -c "import json,sys; print(str(json.load(sys.stdin).get('draft', False)).lower())")"
            if [ "${is_draft}" = "true" ]; then
              draft_exists="true"
            else
              echo "Release tag ${draft_tag} already exists and is not a draft."
              exit 1
            fi
          fi

          if [ -n "${final_release_json}" ]; then
            final_is_draft="$(printf '%s' "${final_release_json}" | python3 -c "import json,sys; print(str(json.load(sys.stdin).get('draft', False)).lower())")"
            if [ "${final_is_draft}" != "true" ]; then
              skip_release="true"
            fi
          fi

          {
            echo "DRAFT_TAG=${draft_tag}"
            echo "DRAFT_TITLE=${draft_title}"
            echo "LATEST_TAG=${latest_tag}"
            echo "LATEST_NAME=${latest_name}"
            echo "FINAL_TAG=${final_tag}"
            echo "DRAFT_EXISTS=${draft_exists}"
            echo "SKIP_RELEASE=${skip_release}"
          } >> "$GITHUB_ENV"

          {
            echo "draft_exists=${draft_exists}"
            echo "skip_release=${skip_release}"
          } >> "$GITHUB_OUTPUT"

      - name: Build draft release notes
        if: steps.draft_meta.outputs.skip_release != 'true'
        env:
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.ref_name }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: |
          set -euo pipefail

          short_sha="${SHA::7}"
          python3 - <<'PY'
          from pathlib import Path
          import re

          source = Path("latest_release_body.txt")
          target = Path("latest_release_body_sanitized.txt")

          if not source.exists():
              target.write_text("", encoding="utf-8")
              raise SystemExit(0)

          text = source.read_text(encoding="utf-8")
          text = re.sub(
              r"<!--\s*manager-highlights:start\s*-->.*?<!--\s*manager-highlights:end\s*-->",
              "",
              text,
              flags=re.DOTALL | re.IGNORECASE,
          )
          text = re.sub(
              r"(?im)^\s*manager-available-stable\s*:\s*true\s*$",
              "",
              text,
          )
          text = text.strip()
          target.write_text(f"{text}\n" if text else "", encoding="utf-8")
          PY
          {
            echo "Automated draft release for ME_OpenDRT."
            echo
            echo "- Version: ${PACKAGE_VERSION}"
            echo "- Base release: ${LATEST_NAME} (${LATEST_TAG})"
            echo "- Branch: ${REF_NAME}"
            echo "- Commit: ${short_sha}"
            echo "- Triggered by: ${ACTOR}"
            echo "- Workflow run: ${SERVER_URL}/${REPO}/actions/runs/${{ github.run_id }}"
            echo
            if [ -s latest_release_body_sanitized.txt ]; then
              echo "## Base Release Notes"
              echo
              cat latest_release_body_sanitized.txt
              echo
            fi
            echo "## Manager Highlights"
            echo
            echo "Add short user-facing highlights between the markers before publishing."
            echo
            echo "<!-- manager-highlights:start -->"
            echo "<!-- manager-highlights:end -->"
            echo
            echo "## Included Artifacts"
            if [ -d artifacts ]; then
              find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec basename {} \; | sed 's/^/- /' | sort
            else
              echo "- No downloaded artifacts were found for this run."
            fi
          } > draft_release_notes.md

      - name: Skip draft release because version is already published
        if: steps.draft_meta.outputs.skip_release == 'true'
        run: |
          {
            echo "ME_OpenDRT draft release skipped cleanly."
            echo
            echo "A published release already exists for ${FINAL_TAG}."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update draft release
        if: steps.draft_meta.outputs.skip_release != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -t release_files < <(find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) | sort)
          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "No packaged ME_OpenDRT artifacts were found."
            exit 1
          fi

          if [ "${DRAFT_EXISTS}" = "true" ]; then
            gh release edit "${DRAFT_TAG}" \
              --title "${DRAFT_TITLE}" \
              --notes-file draft_release_notes.md
            gh release upload "${DRAFT_TAG}" \
              --clobber \
              "${release_files[@]}"
            {
              echo "ME_OpenDRT draft release updated."
              echo
              echo "- Draft tag: ${DRAFT_TAG}"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            gh release create "${DRAFT_TAG}" \
              --draft \
              --title "${DRAFT_TITLE}" \
              --notes-file draft_release_notes.md \
              "${release_files[@]}"
            {
              echo "ME_OpenDRT draft release created."
              echo
              echo "- Draft tag: ${DRAFT_TAG}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
