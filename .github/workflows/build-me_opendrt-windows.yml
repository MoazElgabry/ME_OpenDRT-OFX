name: Build ME_OpenDRT Windows (x86_64 CUDA/OpenCL/CPU)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-2022

    defaults:
      run:
        shell: powershell
        working-directory: ME_OpenDRT/source

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve package version
        id: version
        run: |
          $cmake = Get-Content "CMakeLists.txt" -Raw
          if ($cmake -match 'set\(OPENDRT_DISPLAY_VERSION\s+"([^"]+)"\)') {
            $version = $Matches[1]
          } elseif ($cmake -match 'project\(ME_OpenDRT VERSION\s+([0-9A-Za-z\.\-]+)') {
            $version = $Matches[1]
          } else {
            throw "Could not determine ME_OpenDRT version from ME_OpenDRT/source/CMakeLists.txt"
          }
          "package_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "zip_name=ME_OpenDRT_v${version}_windows_x86_64_portable.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "artifact_name=ME_OpenDRT-v${version}-windows-x86_64" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup MSVC dev command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Detect preinstalled CUDA
        id: detect_cuda
        run: |
          $nvcc = Get-Command nvcc -ErrorAction SilentlyContinue
          if ($null -ne $nvcc) {
            "has_cuda=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Found preinstalled nvcc at $($nvcc.Source)"
            & nvcc --version
          } else {
            "has_cuda=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "No preinstalled nvcc found; CUDA toolkit install will run."
          }

      - name: Setup CUDA Toolkit
        if: steps.detect_cuda.outputs.has_cuda != 'true'
        uses: Jimver/cuda-toolkit@v0.2.29
        with:
          cuda: "12.5.0"
          method: "network"

      - name: Detect preinstalled Ninja
        id: detect_ninja
        run: |
          $ninja = Get-Command ninja -ErrorAction SilentlyContinue
          if ($null -ne $ninja) {
            "has_ninja=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Found preinstalled ninja at $($ninja.Source)"
            & ninja --version
          } else {
            "has_ninja=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "No preinstalled ninja found; install will run."
          }

      - name: Install Ninja
        if: steps.detect_ninja.outputs.has_ninja != 'true'
        run: choco install ninja --no-progress -y

      - name: Configure
        run: cmake -S . -B build-win -G Ninja -DCMAKE_BUILD_TYPE=Release -DME_OPENDRT_BUILD_CUBE_VIEWER_STUB=ON

      - name: Build
        run: cmake --build build-win --config Release

      - name: Verify bundle outputs
        run: |
          if (!(Test-Path "bundle/ME_OpenDRT.ofx.bundle/Contents/Win64/ME_OpenDRT.ofx")) {
            throw "Missing Windows plugin binary"
          }
          if (!(Test-Path "bundle/ME_OpenDRT.ofx.bundle/Contents/Win64/ME_OpenDRT_CubeViewer.exe")) {
            throw "Missing Windows cube viewer binary"
          }

      - name: Package Windows portable bundle
        run: |
          $zipName = "${{ steps.version.outputs.zip_name }}"
          if (Test-Path "..\\..\\$zipName") { Remove-Item "..\\..\\$zipName" -Force }
          Compress-Archive -Path "bundle/ME_OpenDRT.ofx.bundle" -DestinationPath "..\\..\\$zipName" -CompressionLevel Optimal

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: ${{ steps.version.outputs.zip_name }}




