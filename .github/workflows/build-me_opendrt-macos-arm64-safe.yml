name: Build ME_OpenDRT macOS arm64 (safe Metal math required)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos-arm64-safe:
    runs-on: macos-14

    defaults:
      run:
        shell: bash
        working-directory: ME_OpenDRT/source

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve package version
        id: version
        run: |
          version="$(grep -Eo 'set\(OPENDRT_DISPLAY_VERSION "[^"]+"\)' CMakeLists.txt | sed -E 's/.*"([^"]+)".*/\1/' | head -n1)"
          if [ -z "${version}" ]; then
            version="$(grep -Eo 'project\(ME_OpenDRT VERSION [0-9A-Za-z.\-]+' CMakeLists.txt | sed -E 's/.*VERSION ([0-9A-Za-z.\-]+)/\1/' | head -n1)"
          fi
          if [ -z "${version}" ]; then
            echo "Could not determine ME_OpenDRT version from ME_OpenDRT/source/CMakeLists.txt"
            exit 1
          fi
          echo "package_version=${version}" >> "$GITHUB_OUTPUT"
          echo "zip_name=ME_OpenDRT_v${version}_macOS_arm64_safe_math_portable.zip" >> "$GITHUB_OUTPUT"
          echo "artifact_name=ME_OpenDRT-v${version}-macos-arm64-safe-math" >> "$GITHUB_OUTPUT"

      - name: Report macOS toolchain
        run: |
          sw_vers
          xcode-select -p
          xcodebuild -version
          xcrun metal -v || true

      - name: Ensure build tools are available
        run: |
          if command -v ninja >/dev/null 2>&1; then
            echo "ninja already available: $(command -v ninja)"
            ninja --version
          else
            brew install ninja
          fi

      - name: Require Metal safe/precise math flags
        run: |
          cat > /tmp/me_opendrt_flag_probe.metal <<'EOF'
          kernel void flag_probe(device float* dst [[buffer(0)]], uint tid [[thread_position_in_grid]]) { dst[tid] = 0.0; }
          EOF
          xcrun -sdk macosx metal \
            -std=macos-metal2.4 \
            -fmetal-math-mode=safe \
            -fmetal-math-fp32-functions=precise \
            -mmacosx-version-min=13.0 \
            -c /tmp/me_opendrt_flag_probe.metal \
            -o /tmp/me_opendrt_flag_probe.air
          echo "Confirmed Metal safe/precise math flags are supported on this runner."

      - name: Configure
        run: cmake -S . -B build-mac -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 -DME_OPENDRT_BUILD_CUBE_VIEWER_STUB=ON -DME_OPENDRT_VIEWER_FORCE_BUNDLED_GLFW=ON

      - name: Build
        run: cmake --build build-mac --config Release

      - name: Verify bundle outputs
        run: |
          test -f bundle/ME_OpenDRT.ofx.bundle/Contents/MacOS/ME_OpenDRT.ofx
          test -f bundle/ME_OpenDRT.ofx.bundle/Contents/MacOS/ME_OpenDRT_CubeViewer
          test -f bundle/ME_OpenDRT.ofx.bundle/Contents/Resources/OpenDRT.metallib
          otool -l bundle/ME_OpenDRT.ofx.bundle/Contents/MacOS/ME_OpenDRT.ofx | grep -A3 LC_BUILD_VERSION | grep -q "minos 13.0"
          strings bundle/ME_OpenDRT.ofx.bundle/Contents/Resources/OpenDRT.metallib | grep -E -q "air64-apple-macosx13(\\.|$)"
          xcrun metal-objdump -t bundle/ME_OpenDRT.ofx.bundle/Contents/Resources/OpenDRT.metallib | grep -q "OpenDRTKernel"

      - name: Package macOS portable bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            bundle/ME_OpenDRT.ofx.bundle \
            ../../${{ steps.version.outputs.zip_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: ${{ steps.version.outputs.zip_name }}
