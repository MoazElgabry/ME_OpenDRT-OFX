name: Build ME_OpenDRT macOS (universal)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    env:
      OPENDRT_VERSION: v1.2.11
      ZIP_NAME: ME_OpenDRT_v1.2.11_macOS_universal_portable.zip
      ARTIFACT_NAME: ME_OpenDRT-v1.2.11-macos-universal

    runs-on: macos-14

    defaults:
      run:
        shell: bash
        working-directory: ME_OpenDRT/source

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Ensure build tools are available
        run: |
          if command -v ninja >/dev/null 2>&1; then
            echo "ninja already available: $(command -v ninja)"
            ninja --version
          else
            brew install ninja
          fi

      - name: Configure
        run: cmake -S . -B build-mac -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 -DME_OPENDRT_BUILD_CUBE_VIEWER_STUB=ON -DME_OPENDRT_VIEWER_FORCE_BUNDLED_GLFW=ON

      - name: Build
        run: cmake --build build-mac --config Release

      - name: Verify bundle outputs
        run: |
          test -f bundle/ME_OpenDRT.ofx.bundle/Contents/MacOS/ME_OpenDRT.ofx
          test -f bundle/ME_OpenDRT.ofx.bundle/Contents/MacOS/ME_OpenDRT_CubeViewer
          test -f bundle/ME_OpenDRT.ofx.bundle/Contents/Resources/OpenDRT.metallib
          lipo -archs bundle/ME_OpenDRT.ofx.bundle/Contents/MacOS/ME_OpenDRT.ofx | grep -q "x86_64 arm64"
          lipo -archs bundle/ME_OpenDRT.ofx.bundle/Contents/MacOS/ME_OpenDRT_CubeViewer | grep -q "x86_64 arm64"
          otool -l bundle/ME_OpenDRT.ofx.bundle/Contents/MacOS/ME_OpenDRT.ofx | grep -A3 LC_BUILD_VERSION | grep -q "minos 13.0"
          otool -l bundle/ME_OpenDRT.ofx.bundle/Contents/MacOS/ME_OpenDRT_CubeViewer | grep -A3 LC_BUILD_VERSION | grep -q "minos 13.0"
          strings bundle/ME_OpenDRT.ofx.bundle/Contents/Resources/OpenDRT.metallib | grep -E -q "air64-apple-macosx13(\\.|$)"
          xcrun metal-objdump -t bundle/ME_OpenDRT.ofx.bundle/Contents/Resources/OpenDRT.metallib | grep -q "OpenDRTKernel"

      - name: Package macOS portable bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            bundle/ME_OpenDRT.ofx.bundle \
            ../../${ZIP_NAME}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ZIP_NAME }}
